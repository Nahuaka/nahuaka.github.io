<div class="container-fluid">
  <div class="row">
    <div class="col-sm-11 col-centered middle-container-bg">
      <div id="random-tab" class="row random-row" style="display: none;">
        <h1>Find a random anime to watch</h1>
        <form id="random-form">
          <div class="col-sm-12">
            <label for="username">Username:</label>
            <input id="username" type="text" class="form-control" placeholder="Alie" value="Alie">
            <label for="nb-max-episodes">Maximum number of episodes</label>
            <input class="form-control" type="number" id="nb-max-episodes" name="nb-max-episodes" min="1" max="1500" step="1" value="24">
          </div>
          <div class="col-sm-12">
            <div class="form-row">
              <div class="col-xs-6">
                <div class="row">
                  <div class="col-xs-12">
                    <label for="genre-selector">Genre</label>
                    <div class="multi-selector">
                      <div id="genre-selector-toggle" class="select-field select-look">
                        <input type="text" id="genre-selector" class="input-selector" placeholder="Any"></input>
                        <span class="down-arrow down-arrow-look">&blacktriangledown;</span>
                      </div>
                      <div id="list" class="list-look"></div>
                    </div>
                  </div>
                  <div class="col-xs-11">
                    <div id="genre-tag"></div>
                  </div>
                </div>
              </div>
              <div class="col-xs-6">
                <div class="row">
                  <div class="col-xs-12">
                    <label for="format-selector">Format</label>
                    <div class="multi-selector">
                      <div id="format-selector-toggle" class="select-field-format select-look">
                        <input type="text" id="format-selector" class="input-selector" placeholder="Any"></input>
                        <span class="down-arrow-format down-arrow-look">&blacktriangledown;</span>
                      </div>
                      <div id="listFormat" class="list-look"></div>
                    </div>
                  </div>
                  <div class="col-xs-11">
                    <div id="format-tag"></div>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div class="col-sm-12 btn-center">
            <button class="btn-submit btn" type="submit">Random</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
