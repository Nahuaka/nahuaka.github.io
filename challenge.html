    <div class="navbar-header">
      <button type="button" class="navbar-toggle" data-toggle="collapse" data-target="#myNavbar">

      <div class="row justify-content-start" style="float:right">

<div class="container-fluid">
  <div class="row">
    <div class="col-md-10 col-centered">
      <div class="row">
        <label class="label-challenge" for="user-name">Username:</label>
      </div>
      <div class="row justify-content-start">
        <div class="col-sm-2 col-md-2 col-lg-1 col-xl-2">
          <input id="user-name" class="input-look challenge-input" type="text" placeholder="Alie" value="Alie">
        </div>
        <div class="col-sm-4">
          <button class="challenge-input button-challenge" id="button-search-challenge">Search</button>
        </div>
      </div>
      <div class="row">
        <label class="label-challenge" for="archive-link">Archive:</label>
      </div>
      <div class="row justify-content-start">
        <div class="col-sm-6 col-md-6 col-lg-4 col-xl-6">
          <input id="archive-link" class="input-look challenge-input" type="text" placeholder="https://anilist.co/">
        </div>
        <div class="col-sm-6">
          <button class="challenge-input button-challenge" id="button-archive-challenge">Archive</button>
          <button class="challenge-input button-challenge" id="button-archive-challenge-remove">Remove</button>
          <button class="challenge-input button-challenge" id="button-archive-challenge-reset">Reset</button>
        </div>
      </div>
      <div class="row">
        <label class="label-challenge" for="checking-link">Checking:</label>
      </div>
      <div class="row justify-content-start">
        <div class="col-sm-6 col-md-6 col-lg-4 col-xl-6">
          <input id="checking-link" class="input-look challenge-input" type="text" placeholder="https://anilist.co/">
        </div>
        <div class="col-sm-6">
          <button class="challenge-input button-challenge" id="button-checking-challenge">Set</button>
          <button class="challenge-input button-challenge" id="button-checking-challenge-unreset">Unset</button>
          <button class="challenge-input button-challenge" id="button-checking-challenge-reset">Reset</button>
        </div>
      </div>
      <div class="row" id="preview-challenge-all">
      </div>
      <div id="footer"></div>
    </div>
  </div>
</div>
